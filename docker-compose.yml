services:
  callcenter-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: callcenter-mcp-http
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # MCP HTTP settings (examples)
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3001
      MCP_HTTP_TOKEN: replace-with-a-strong-random-token

      # SIP credentials (examples)
      SIP_USERNAME: "100"
      SIP_PASSWORD: "your-sip-password"
      SIP_SERVER_IP: "192.168.1.10"
      SIP_SERVER_PORT: "5060"

      # OpenAI credentials (examples)
      OPENAI_API_KEY: "sk-your-openai-api-key"
      USER_NAME: "Your Name"
