services:
  callcenter-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: callcenter-mcp-http
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # MCP HTTP settings (examples)
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3001
      MCP_HTTP_TOKEN: ${MCP_HTTP_TOKEN:?MCP_HTTP_TOKEN environment variable required}

      # SIP credentials (examples)
      SIP_USERNAME: ${SIP_USERNAME:?SIP_USERNAME environment variable required}
      SIP_PASSWORD: ${SIP_PASSWORD:?SIP_PASSWORD environment variable required}
      SIP_SERVER_IP: ${SIP_SERVER_IP:?SIP_SERVER_IP environment variable required}
      SIP_SERVER_PORT: ${SIP_SERVER_PORT:-5060}

      # OpenAI credentials (examples)
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY environment variable required}
      USER_NAME: ${USER_NAME:-User}
